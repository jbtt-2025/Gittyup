name: Build Gittyup win64

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-win64:
    runs-on: windows-2022

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Set git identity
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@users.noreply.github.com"

      - name: Setup Strawberry Perl + required modules
        uses: shogo82148/actions-setup-perl@v1
        with:
          perl-version: '5.30'
          distribution: strawberry
          enable-modules-cache: false
          install-modules: |
            Locale::Maketext::Simple
            Params::Check
            IPC::Cmd

      - name: Force Strawberry Perl ahead of Git Perl in PATH
        run: |
          if (Test-Path 'C:\Strawberry\perl\bin') {
            Add-Content $env:GITHUB_PATH 'C:\Strawberry\perl\bin'
          }
          if (Test-Path 'C:\Strawberry\c\bin') {
            Add-Content $env:GITHUB_PATH 'C:\Strawberry\c\bin'
          }

      - name: Install NASM
        uses: ilammy/setup-nasm@v1

      - name: Setup MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Fast preflight for Perl / NASM / OpenSSL Configure
        run: |
          Write-Host "=== perl in PATH ==="
          where.exe perl
          perl -v

          Write-Host "=== nasm in PATH ==="
          where.exe nasm
          nasm -v

          Write-Host "=== perl modules ==="
          perl -MLocale::Maketext::Simple -MParams::Check -MIPC::Cmd -e "print qq(Perl modules OK`n)"

          Write-Host "=== openssl configure dry run ==="
          Push-Location dep/openssl/openssl
          perl Configure VC-WIN64A no-tests
          Pop-Location

      - name: Install Qt
        uses: jurplel/install-qt-action@v4.3.0
        timeout-minutes: 10
        with:
          version: 6.6.0
          target: desktop
          host: windows
          arch: win64_msvc2019_64
          install-deps: true
          modules: qtwebengine
          cache: true

      - name: Install Ninja
        uses: seanmiddleditch/gha-setup-ninja@v6
        with:
          version: 1.11.1
          platform: win
          destination: ninja

      - name: Install NSIS for CPack
        run: |
          choco install nsis -y
          $nsis = @(
            'C:\Program Files (x86)\NSIS',
            'C:\Program Files\NSIS'
          ) | Where-Object { Test-Path $_ } | Select-Object -First 1

          if ($nsis) {
            Add-Content $env:GITHUB_PATH $nsis
          } else {
            throw "NSIS installation directory not found"
          }

      - name: Build OpenSSL
        run: |
          Push-Location dep/openssl/openssl
          perl Configure VC-WIN64A
          nmake
          Pop-Location

      - name: Configure Release
        env:
          CMAKE_RC_FLAGS: /C 1252
        run: |
          New-Item -ItemType Directory -Force -Path build/release | Out-Null
          Push-Location build/release

          cmake -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DUPDATE_TRANSLATIONS=ON `
            -DGITTYUP_CI_TESTS=ON `
            -DUSE_SYSTEM_QT=OFF `
            -DUSE_SYSTEM_LIBSSH2=OFF `
            -DUSE_BUNDLED_ZLIB=1 `
            -DUSE_SSH:STRING=localbuild `
            -DUSE_SYSTEM_OPENSSL=OFF `
            -DCMAKE_C_COMPILER=cl `
            -DCMAKE_CXX_COMPILER=cl `
            ../..

          Pop-Location

      - name: Build package
        run: |
          Push-Location build/release
          ninja package
          Pop-Location

      - name: Show generated package files
        run: |
          Get-ChildItem -Path build/release/pack -Recurse | Select-Object FullName, Length

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Gittyup-win64
          path: build/release/pack/Gittyup-*
          if-no-files-found: error
          retention-days: 14
