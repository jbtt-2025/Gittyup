name: Build Gittyup Win64 Portable Slim

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-win64-slim:
    runs-on: windows-latest

    defaults:
      run:
        shell: bash

    steps:
      # 1️⃣ Checkout source and submodules
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      # 2️⃣ Set git identity
      - name: Set git identity
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@users.noreply.github.com"

      # 3️⃣ Setup MSVC developer environment
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # 4️⃣ Setup Perl and required modules
      - name: Setup Perl
        uses: shogo82148/actions-setup-perl@v1
        with:
          perl-version: "5.38"

      - name: Install Perl modules needed by OpenSSL
        shell: pwsh
        run: |
          cpan Locale::Maketext::Simple Params::Check IPC::Cmd

      # 5️⃣ Install NASM and Ninja
      - name: Install NASM and Ninja
        shell: pwsh
        run: |
          choco install nasm ninja -y

      # 6️⃣ Install Qt
      - name: Install Qt
        uses: jurplel/install-qt-action@v4.3.1
        with:
          version: "6.6.0"
          target: "desktop"
          host: "windows"
          arch: "win64_msvc2019_64"
          modules: "qtwebengine"
          cache: true

      # 7️⃣ Build OpenSSL
      - name: Build OpenSSL
        run: |
          cd dep/openssl/openssl
          perl Configure VC-WIN64A
          nmake

      # 8️⃣ Configure Gittyup CMake
      - name: Configure CMake
        run: |
          mkdir -p build/release
          cd build/release
          cmake -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DUPDATE_TRANSLATIONS=OFF \
            -DENABLE_TESTS=OFF \
            -DUSE_SYSTEM_QT=OFF \
            -DUSE_SYSTEM_LIBSSH2=OFF \
            -DUSE_BUNDLED_ZLIB=1 \
            -DUSE_SSH:STRING=localbuild \
            -DUSE_SYSTEM_OPENSSL=OFF \
            -DCMAKE_C_COMPILER=cl \
            -DCMAKE_CXX_COMPILER=cl \
            ../..

      # 9️⃣ Build Gittyup
      - name: Build
        run: |
          cd build/release
          ninja

      # 🔟 Stage portable files
      - name: Stage portable files
        run: |
          cd build/release
          rm -rf stage
          cmake --install . --prefix "$PWD/stage"

          # 删除调试/静态文件减小体积
          find stage -type f \( -name '*.pdb' -o -name '*.lib' -o -name '*.exp' \) -delete

          # 保留 Qt 必需插件目录
          for plugin in platforms imageformats; do
            find stage/plugins/ -mindepth 1 -maxdepth 1 ! -name $plugin -exec rm -rf {} +
          done

          # 保留 Qt 核心资源，删除未用模块
          rm -rf stage/qml
          rm -rf stage/printsupport
          rm -rf stage/designer

      # 1️⃣1️⃣ Create slim ZIP
      - name: Create ZIP
        shell: pwsh
        run: |
          Compress-Archive `
            -Path "build/release/stage/*" `
            -DestinationPath "build/release/Gittyup-win64-slim.zip" `
            -Force

      # 1️⃣2️⃣ Upload artifact
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Gittyup-win64-slim
          path: build/release/Gittyup-win64-slim.zip
          if-no-files-found: error
          retention-days: 14
